version: '3.8'

services:
  llamacpp-service:
    image: ghcr.io/ggml-org/llama.cpp:server
    cpuset: '128-255'
    shm_size: '32gb'
    container_name: llamacpp-service
    hostname: llamacpp-service
    restart: unless-stopped
      #command: -m /models/unsloth/Qwen3.5-35B-A3B-GGUF/Qwen3.5-35B-A3B-Q4_K_M.gguf --port 8000 --host 0.0.0.0 -c 128000 -t 128 --n-gpu-layers 0 
    command: -m /models/unsloth/Qwen3.5-35B-A3B-GGUF/Qwen3.5-35B-A3B-Q8_0.gguf --port 8000 --host 0.0.0.0 -c 128000 -t 128 --n-gpu-layers 0 --parallel 8 --cont-batching --mlock 
    privileged: true
      #network_mode: host
    ports:
      - 8081:8000
    volumes:
      - /mnt/data/models/:/models/
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: "128"
        reservations:
          cpus: "128"

  openclaw-gateway:
    image: pinchbench:v1
    cpuset: '0-127'
    container_name: openclaw-gateway
    restart: unless-stopped
      #command: bash -c "while true; do echo hello; sleep 100; done"
    ports:
      - "18789:18789"
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/workspace
    environment:
      - NODE_ENV=production
    user: "1000:1000"
    depends_on:
      llamacpp-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: "16.0"
        reservations:
          memory: 512M
          cpus: "16.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  openclaw-cli:
    image: pinchbench:v1
    container_name: openclaw-cli
    profiles:
      - tools
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/workspace
    user: "1000:1000"
    stdin_open: true
    tty: true
